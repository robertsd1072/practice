<html>	
	<style type="text/css">

		button

			background-color: lightgreen;

			border-radius: 30px;

			height: 80px;

		.modal 
		{
		  display: flex; /* Hidden by default */

		  z-index: 1; /* Sit on top */

		  left: 0;
		  top: 0;

		  height: 100%; /* Full height */
		  overflow-y: auto; /* Enable scroll if needed */
		  background-color: rgba(0,0,0,0); /* Black w/ opacity */
		  color: red;

		.modal-content
		{
		  margin: 15% auto; /* 15% from the top and centered */
		  padding: 20px;
		  border: 0px solid #888;
		  width: 80%; /* Could be more or less, depending on screen size */
		}
	</style>


	<script>
		class boardCell
		{
			constructor(piece, elem)
			{
				this.piece = piece;
				this.elem = elem;
			}
		}

		var board_arr = [];
		var flipped = false;
		var cell_selected = null;
		var openings_list = [["light", "e2-e4", "e7-e5", "g1-Nf3", "b8-Nc6", "f1-Bc4", "Nf6", "Ng5", "d5", "start", "exd5", "Na5", "Bb5", "c6", "dxc6", "bxc6", "Bd3", "h6", "Ne4", "Nxe4", "Bxe4"]
							/*,["light", "e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "d5", "start", "exd5", "Nxd5", "Nxf7", "Kxf7", "Qf3", "Ke8", "Bxd5"]
							,["light", "e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "d5", "start", "exd5", "Nxd5", "Nxf7", "Kxf7", "Qf3", "Qf6", "Bxd5"]
							,["light", "e4", "e5", "Nf3", "Nc6", "Bc4", "Nf6", "Ng5", "d5", "start", "exd5", "Nxd5", "Nxf7", "Kxf7", "Qf3", "Ke6", "Nc3"]*/];
		var accuracy_score = 0;
		var time_score = 0;

		async function sleep(ms)
		{
			await new Promise((resolve) => setTimeout(resolve, ms));
		}

		var getRowIndex = function(cell_id)
		{
			return (7 - (parseInt(cell_id.substring(1, 2)) - 1));
		}

		var getColIndex = function(cell_id)
		{
			var col_letter = cell_id.substring(0, 1);
			var index_2 = -1;
			if (col_letter == "a")
				index_2 = 0;
			else if (col_letter == "b")
				index_2 = 1;
			else if (col_letter == "c")
				index_2 = 2;
			else if (col_letter == "d")
				index_2 = 3;
			else if (col_letter == "e")
				index_2 = 4;
			else if (col_letter == "f")
				index_2 = 5;
			else if (col_letter == "g")
				index_2 = 6;
			else if (col_letter == "h")
				index_2 = 7;

			return index_2;
		}

		var setPieceCell = function(piece, old_cell_id, new_cell_id, left_over_width, chess_cel_length, label_cel_length)
		{
			/*var index_1 = getRowIndex(old_cell_id);
			var index_2 = getColIndex(old_cell_id);

			board_arr[index_1][index_2].piece = null;*/

			var index_1 = getRowIndex(new_cell_id);
			var index_2 = getColIndex(new_cell_id);

			board_arr[index_1][index_2].piece = piece;

			if (!flipped)
			{
				piece.style.left = (left_over_width / 2) + 16 + label_cel_length + ((index_2) * chess_cel_length);
				piece.style.top = 8 + label_cel_length + ((index_1) * chess_cel_length);
			}
			else
			{
				piece.style.left = (left_over_width / 2) + 16 + label_cel_length + ((7-index_2) * chess_cel_length);
				piece.style.top = 8 + label_cel_length + ((7-index_1) * chess_cel_length);
			}
		}

		var pieceCanMoveTo = function(selected_cell, new_cell_id)
		{
			var cur_index_1 = getRowIndex(selected_cell.elem.id);
			var cur_index_2 = getColIndex(selected_cell.elem.id);

			var positions_arr = [];

			if (selected_cell.piece.id.substring(2,3) == "p")
			{
				if (selected_cell.piece.id.substring(0,1) == "l")
				{
					if (cur_index_1-1 > -1 && board_arr[cur_index_1-1][cur_index_2].piece == null)
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2].elem.id);

					if (selected_cell.elem.id.substring(1,2) == "2")
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2].elem.id);

					if (cur_index_1-1 > -1 && cur_index_2-1 > -1 && board_arr[cur_index_1-1][cur_index_2-1].piece != null 
						&& board_arr[cur_index_1-1][cur_index_2-1].piece.id.substring(0,1) == "d")
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2-1].elem.id);

					if (cur_index_1-1 > -1 && cur_index_2+1 < 8 && board_arr[cur_index_1-1][cur_index_2+1].piece != null 
						&& board_arr[cur_index_1-1][cur_index_2+1].piece.id.substring(0,1) == "d")
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2+1].elem.id);
				}
				else
				{
					if (cur_index_1+1 < 8 && board_arr[cur_index_1+1][cur_index_2].piece == null)
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2].elem.id);

					if (selected_cell.elem.id.substring(1,2) == "7")
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2].elem.id);

					if (cur_index_1+1 < 8 && cur_index_2-1 > -1 && board_arr[cur_index_1+1][cur_index_2-1].piece != null 
						&& board_arr[cur_index_1+1][cur_index_2-1].piece.id.substring(0,1) == "l")
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2-1].elem.id);

					if (cur_index_1+1 < 8 && cur_index_2+1 < 8 && board_arr[cur_index_1+1][cur_index_2+1].piece != null 
						&& board_arr[cur_index_1+1][cur_index_2+1].piece.id.substring(0,1) == "l")
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2+1].elem.id);
				}
			}
			if (selected_cell.piece.id.substring(2,3) == "r" || selected_cell.piece.id.substring(2,3) == "q")
			{
				for (var up=cur_index_1-1; up > -1; up--)
				{
					if (board_arr[up][cur_index_2].piece == null)
						positions_arr.push(board_arr[up][cur_index_2].elem.id);
					else if (board_arr[up][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[up][cur_index_2].elem.id);
						break;
					}
					else if (board_arr[up][cur_index_2].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var down=cur_index_1+1; down < 8; down++)
				{
					if (board_arr[down][cur_index_2].piece == null)
						positions_arr.push(board_arr[down][cur_index_2].elem.id);
					else if (board_arr[down][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[down][cur_index_2].elem.id);
						break;
					}
					else if (board_arr[down][cur_index_2].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var left=cur_index_2-1; left > -1; left--)
				{
					if (board_arr[cur_index_1][left].piece == null)
						positions_arr.push(board_arr[cur_index_1][left].elem.id);
					else if (board_arr[cur_index_1][left].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[cur_index_1][left].elem.id);
						break;
					}
					else if (board_arr[cur_index_1][left].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var right=cur_index_2+1; right < 8; right++)
				{
					if (board_arr[cur_index_1][right].piece == null)
						positions_arr.push(board_arr[cur_index_1][right].elem.id);
					else if (board_arr[cur_index_1][right].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[cur_index_1][right].elem.id);
						break;
					}
					else if (board_arr[cur_index_1][right].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}
			}
			if (selected_cell.piece.id.substring(2,3) == "n")
			{
				if (cur_index_1-2 > -1 && cur_index_2-1 > -1)
				{
					if (board_arr[cur_index_1-2][cur_index_2-1].piece == null)
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2-1].elem.id);
					else if (board_arr[cur_index_1-2][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2-1].elem.id);
				}

				if (cur_index_1-2 > -1 && cur_index_2+1 < 8)
				{
					if (board_arr[cur_index_1-2][cur_index_2+1].piece == null)
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2+1].elem.id);
					else if (board_arr[cur_index_1-2][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2+1].elem.id);
				}

				if (cur_index_1+2 < 8 && cur_index_2-1 > -1)
				{
					if (board_arr[cur_index_1+2][cur_index_2-1].piece == null)
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2-1].elem.id);
					else if (board_arr[cur_index_1+2][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2-1].elem.id);
				}

				if (cur_index_1+2 < 8 && cur_index_2+1 < 8)
				{
					if (board_arr[cur_index_1+2][cur_index_2+1].piece == null)
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2+1].elem.id);
					else if (board_arr[cur_index_1+2][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2+1].elem.id);
				}



				if (cur_index_1-1 > -1 && cur_index_2-2 > -1)
				{
					if (board_arr[cur_index_1-1][cur_index_2-2].piece == null)
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2-2].elem.id);
					else if (board_arr[cur_index_1-1][cur_index_2-2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2-2].elem.id);
				}

				if (cur_index_1+1 < 8 && cur_index_2-2 > -1)
				{
					if (board_arr[cur_index_1+1][cur_index_2-2].piece == null)
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2-2].elem.id);
					else if (board_arr[cur_index_1+1][cur_index_2-2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2-2].elem.id);
				}

				if (cur_index_1-1 > -1 && cur_index_2+2 < 8)
				{
					if (board_arr[cur_index_1-1][cur_index_2+2].piece == null)
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2+2].elem.id);
					else if (board_arr[cur_index_1-1][cur_index_2+2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2+2].elem.id);
				}

				if (cur_index_1+1 < 8 && cur_index_2+2 < 8)
				{
					if (board_arr[cur_index_1+1][cur_index_2+2].piece == null)
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2+2].elem.id);
					else if (board_arr[cur_index_1+1][cur_index_2+2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2+2].elem.id);
				}

			}
			if (selected_cell.piece.id.substring(2,3) == "b" || selected_cell.piece.id.substring(2,3) == "q")
			{
				var row = cur_index_1-1;
				var col = cur_index_2-1;

				while (row > -1 && col > -1)
				{
					if (board_arr[row][col].piece == null)
						positions_arr.push(board_arr[row][col].elem.id);
					else if (board_arr[row][col].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[row][col].elem.id);
						break;
					}
					else if (board_arr[row][col].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;

					row--;
					col--;
				}

				row = cur_index_1-1;
				col = cur_index_2+1;

				while (row > -1 && col < 8)
				{
					if (board_arr[row][col].piece == null)
						positions_arr.push(board_arr[row][col].elem.id);
					else if (board_arr[row][col].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[row][col].elem.id);
						break;
					}
					else if (board_arr[row][col].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;

					row--;
					col++;
				}

				row = cur_index_1+1;
				col = cur_index_2-1;

				while (row < 8 && col > -1)
				{
					if (board_arr[row][col].piece == null)
						positions_arr.push(board_arr[row][col].elem.id);
					else if (board_arr[row][col].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[row][col].elem.id);
						break;
					}
					else if (board_arr[row][col].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;

					row++;
					col--;
				}

				row = cur_index_1+1;
				col = cur_index_2+1;

				while (row < 8 && col < 8)
				{
					if (board_arr[row][col].piece == null)
						positions_arr.push(board_arr[row][col].elem.id);
					else if (board_arr[row][col].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[row][col].elem.id);
						break;
					}
					else if (board_arr[row][col].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;

					row++;
					col++;
				}
			}
			if (selected_cell.piece.id.substring(2,3) == "k")
			{
				if (cur_index_1-1 > -1 
					&& (board_arr[cur_index_1-1][cur_index_2].piece == null 
						|| board_arr[cur_index_1-1][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1-1][cur_index_2].elem.id);
				}

				if (cur_index_1+1 < 8 
					&& (board_arr[cur_index_1+1][cur_index_2].piece == null 
						|| board_arr[cur_index_1+1][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1+1][cur_index_2].elem.id);
				}

				if (cur_index_2-1 > -1 
					&& (board_arr[cur_index_1][cur_index_2-1].piece == null 
						|| board_arr[cur_index_1][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1][cur_index_2-1].elem.id);
				}
				
				if (cur_index_2+1 < 8 
					&& (board_arr[cur_index_1][cur_index_2+1].piece == null 
						|| board_arr[cur_index_1][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1][cur_index_2+1].elem.id);
				}


				// Corners
				if (cur_index_1-1 > -1 && cur_index_2-1 > -1
					&& (board_arr[cur_index_1-1][cur_index_2-1].piece == null 
						|| board_arr[cur_index_1-1][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1-1][cur_index_2-1].elem.id);
				}

				if (cur_index_1+1 < 8 && cur_index_2+1 < 8
					&& (board_arr[cur_index_1+1][cur_index_2+1].piece == null 
						|| board_arr[cur_index_1+1][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1+1][cur_index_2+1].elem.id);
				}

				if (cur_index_1+1 < 8 && cur_index_2-1 > -1 
					&& (board_arr[cur_index_1+1][cur_index_2-1].piece == null 
						|| board_arr[cur_index_1+1][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1+1][cur_index_2-1].elem.id);
				}
				
				if (cur_index_1-1 > -1 && cur_index_2+1 < 8 
					&& (board_arr[cur_index_1-1][cur_index_2+1].piece == null 
						|| board_arr[cur_index_1-1][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1)))
				{
					positions_arr.push(board_arr[cur_index_1-1][cur_index_2+1].elem.id);
				}
			}


			for (var i=0; i<positions_arr.length; i++)
			{
				if (new_cell_id == positions_arr[i])
					return true;
			}

			return false;
		}

		var onCellClick = function(cell_id) 
		{
			var index_1 = getRowIndex(cell_id);
			var index_2 = getColIndex(cell_id);

			//console.log("index_1 = "+index_1);
			//console.log("index_2 = "+index_2);

			if (board_arr[index_1][index_2].piece == null)
				console.log(board_arr[index_1][index_2].elem.id+" clicked: null");
			else
				console.log(board_arr[index_1][index_2].elem.id+" clicked: "+board_arr[index_1][index_2].piece.id);

			/*console.log("	Before:");
			if (cell_selected != null)
				console.log("cell_selected = "+cell_selected.elem.id+","+(cell_selected.piece == null ? "no piece" : cell_selected.piece.id));
			else
				console.log("cell_selected = null");*/

			if (cell_selected == board_arr[index_1][index_2])
			{
				cell_selected = null;
				if (board_arr[index_1][index_2].elem.classList.contains("td_light"))

					if (!player_input && temp_arr[j+2] == "start")
						document.getElementById("countdown_text").innerHTML = "1";

					if (!player_input && temp_arr[j+1] == "start")
					{
						document.getElementById("countdown_div_div").style.fontSize = 100;
						document.getElementById("countdown_text").innerHTML = "YOUR TURN!";
					}

					if (temp_arr[j] == "start")
					{
						document.getElementById("countdown_div").style.display = "none";
						player_input = true;
						break;
					}

					if (temp_arr[j].length == 2)
					{
						var index_1 = getRowIndex(temp_arr[j]);
						var index_2 = getColIndex(temp_arr[j]);

						var cell_selected = null;

						if (j % 2 == 1) // Odd, light move
						{
							for (var k=7; k>0; k--)
							{
								//if (board_arr[k][index_2].piece != null) 
								//	console.log("checking k="+k+" and piece = "+board_arr[k][index_2].piece.id);

								if (board_arr[k][index_2].piece != null && board_arr[k][index_2].piece.id.substring(0, 3) == "l_p")
								{
									//console.log("found");
									cell_selected = board_arr[k][index_2];
									break;
								}
							}
						}
						else // Even, dark move
						{
							for (var k=0; k<7; k++)
							{
								//if (board_arr[k][index_2].piece != null) 
								//	console.log("checking k="+k+" and piece = "+board_arr[k][index_2].piece.id);

								if (board_arr[k][index_2].piece != null && board_arr[k][index_2].piece.id.substring(0, 3) == "d_p")
								{
									//console.log("found");
									cell_selected = board_arr[k][index_2];
									break;
								}
							}
						}

						//console.log("selected "+cell_selected.piece.id);

						if (board_arr[index_1][index_2].piece != null)
						{
							//console.log("made "+board_arr[index_1][index_2].piece.id+" disappear");
							board_arr[index_1][index_2].piece.style.opacity = 0;
						}

						setPieceCell(cell_selected.piece, cell_selected.elem.id, board_arr[index_1][index_2].elem.id, left_over_width, chess_cel_length, label_cel_length);

						//console.log("cleared old cell "+cell_selected.elem.id);
						var index_1_old = getRowIndex(cell_selected.elem.id);
						var index_2_old = getColIndex(cell_selected.elem.id);

						//console.log("old indexes = "+index_1_old+","+index_2_old);

						board_arr[index_1_old][index_2_old].piece = null;

						console.log("moved "+board_arr[index_1][index_2].piece.id+" to "+board_arr[index_1][index_2].elem.id);
					}

					if (!player_input)
						await new Promise(r => setTimeout(r, 1000));
					else if ((temp_arr[0] == "light" && j % 2 == 0) || (temp_arr[0] == "dark" && j % 2 == 1))
						await new Promise(r => setTimeout(r, 200));
				}

				openings_list.splice(index, 1);

				document.getElementById("openings_text").innerHTML = document.getElementById("openings_text").innerHTML + "<br><br>";

				// reset
			}
		}

		window.onresize = onResizing;
		window.onload = onLoad;
	</script>
