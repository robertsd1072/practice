		var getRowIndex = function(cell_id)
		{
			return (7 - (parseInt(cell_id.substring(1, 2)) - 1));
		}

		var getColIndex = function(cell_id)
		{
			var col_letter = cell_id.substring(0, 1);
			var index_2 = -1;
			if (col_letter == "a")
				index_2 = 0;
			else if (col_letter == "b")
				index_2 = 1;
			else if (col_letter == "c")
				index_2 = 2;
			else if (col_letter == "d")
				index_2 = 3;
			else if (col_letter == "e")
				index_2 = 4;
			else if (col_letter == "f")
				index_2 = 5;
			else if (col_letter == "g")
				index_2 = 6;
			else if (col_letter == "h")
				index_2 = 7;

			return index_2;
		}

		var setPieceCell = function(piece, old_cell_id, new_cell_id, left_over_width, chess_cel_length, label_cel_length)
		{
			/*var index_1 = getRowIndex(old_cell_id);
			var index_2 = getColIndex(old_cell_id);

			board_arr[index_1][index_2].piece = null;*/

			var index_1 = getRowIndex(new_cell_id);
			var index_2 = getColIndex(new_cell_id);

			board_arr[index_1][index_2].piece = piece;

			if (!flipped)
			{
				piece.style.left = (left_over_width / 2) + 16 + label_cel_length + ((index_2) * chess_cel_length);
				piece.style.top = 8 + label_cel_length + ((index_1) * chess_cel_length);
			}
			else
			{
				piece.style.left = (left_over_width / 2) + 16 + label_cel_length + ((7-index_2) * chess_cel_length);
				piece.style.top = 8 + label_cel_length + ((7-index_1) * chess_cel_length);
			}
		}

		var pieceCanMoveTo = function(selected_cell, new_cell_id)
		{
			var cur_index_1 = getRowIndex(selected_cell.elem.id);
			var cur_index_2 = getColIndex(selected_cell.elem.id);

			var positions_arr = [];

			if (selected_cell.piece.id.substring(2,3) == "p")
			{
				if (selected_cell.piece.id.substring(0,1) == "l")
				{
					if (cur_index_1-1 > -1 && board_arr[cur_index_1-1][cur_index_2].piece == null)
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2].elem.id);

					if (selected_cell.elem.id.substring(1,2) == "2")
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2].elem.id);

					if (cur_index_1-1 > -1 && cur_index_2-1 > -1 && board_arr[cur_index_1-1][cur_index_2-1].piece != null 
						&& board_arr[cur_index_1-1][cur_index_2-1].piece.id.substring(0,1) == "d")
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2-1].elem.id);

					if (cur_index_1-1 > -1 && cur_index_2+1 < 8 && board_arr[cur_index_1-1][cur_index_2+1].piece != null 
						&& board_arr[cur_index_1-1][cur_index_2+1].piece.id.substring(0,1) == "d")
						positions_arr.push(board_arr[cur_index_1-1][cur_index_2+1].elem.id);
				}
				else
				{
					if (cur_index_1+1 < 8 && board_arr[cur_index_1+1][cur_index_2].piece == null)
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2].elem.id);

					if (selected_cell.elem.id.substring(1,2) == "7")
						positions_arr.push(board_arr[cur_index_1+2][cur_index_2].elem.id);

					if (cur_index_1+1 < 8 && cur_index_2-1 > -1 && board_arr[cur_index_1+1][cur_index_2-1].piece != null 
						&& board_arr[cur_index_1+1][cur_index_2-1].piece.id.substring(0,1) == "l")
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2-1].elem.id);

					if (cur_index_1+1 < 8 && cur_index_2+1 < 8 && board_arr[cur_index_1+1][cur_index_2+1].piece != null 
						&& board_arr[cur_index_1+1][cur_index_2+1].piece.id.substring(0,1) == "l")
						positions_arr.push(board_arr[cur_index_1+1][cur_index_2+1].elem.id);
				}
			}
			if (selected_cell.piece.id.substring(2,3) == "r" || selected_cell.piece.id.substring(2,3) == "q")
			{
				for (var up=cur_index_1-1; up > -1; up--)
				{
					if (board_arr[up][cur_index_2].piece == null)
						positions_arr.push(board_arr[up][cur_index_2].elem.id);
					else if (board_arr[up][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[up][cur_index_2].elem.id);
						break;
					}
					else if (board_arr[up][cur_index_2].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var down=cur_index_1+1; down < 8; down++)
				{
					if (board_arr[down][cur_index_2].piece == null)
						positions_arr.push(board_arr[down][cur_index_2].elem.id);
					else if (board_arr[down][cur_index_2].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[down][cur_index_2].elem.id);
						break;
					}
					else if (board_arr[down][cur_index_2].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var left=cur_index_2-1; left > -1; left--)
				{
					if (board_arr[cur_index_1][left].piece == null)
						positions_arr.push(board_arr[cur_index_1][left].elem.id);
					else if (board_arr[cur_index_1][left].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[cur_index_1][left].elem.id);
						break;
					}
					else if (board_arr[cur_index_1][left].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}

				for (var right=cur_index_2+1; right < 8; right++)
				{
					if (board_arr[cur_index_1][right].piece == null)
						positions_arr.push(board_arr[cur_index_1][right].elem.id);
					else if (board_arr[cur_index_1][right].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
					{
						positions_arr.push(board_arr[cur_index_1][right].elem.id);
						break;
					}
					else if (board_arr[cur_index_1][right].piece.id.substring(0,1) == selected_cell.piece.id.substring(0,1))
						break;
				}
			}
			if (selected_cell.piece.id.substring(2,3) == "n")
			{
				if (cur_index_1-2 > -1 && cur_index_2-1 > -1)
				{
					if (board_arr[cur_index_1-2][cur_index_2-1].piece == null)
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2-1].elem.id);
					else if (board_arr[cur_index_1-2][cur_index_2-1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2-1].elem.id);
				}

				if (cur_index_1-2 > -1 && cur_index_2+1 < 8)
				{
					if (board_arr[cur_index_1-2][cur_index_2+1].piece == null)
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2+1].elem.id);
					else if (board_arr[cur_index_1-2][cur_index_2+1].piece.id.substring(0,1) != selected_cell.piece.id.substring(0,1))
						positions_arr.push(board_arr[cur_index_1-2][cur_index_2+1].elem.id);
				}

				if (cur_index_1+2 < 8 && cur_index_2-1 > -1)
				{

						{
							var temp_cell_selected = board_arr[getRowIndex(temp_arr[j].substring(3, 5))][getColIndex(temp_arr[j].substring(3, 5))];

							add_this_text = temp_arr[j].substring(3, 5);

							if (piece_captured != null)
								add_this_text = "x"+add_this_text;

							if (piece_captured != null && temp_cell_selected.piece.id.substring(2, 3) == "p")
							{
								add_this_text 
									= board_arr[getRowIndex(temp_arr[j].substring(0, 2))][getColIndex(temp_arr[j].substring(0, 2))].elem.id.substring(0, 1) 
										+ add_this_text;
							}

							switch (temp_cell_selected.piece.id.substring(2, 3))
							{
								case "r":
									add_this_text = "R"+add_this_text;
									break;
								case "n":
									add_this_text = "N"+add_this_text;
									break;
								case "b":
									add_this_text = "B"+add_this_text;
									break;
								case "q":
									add_this_text = "Q"+add_this_text;
									break;
								case "k":
									add_this_text = "K"+add_this_text;
									break;
							}
						}

						if (player_input && ((temp_arr[0] == "light" && j % 2 == 0) || (temp_arr[0] == "dark" && j % 2 == 1)))
						{
							if (times_wrong > 0)
							{
								add_this_text = "<span style=\"color:#ff9191\">" + add_this_text + "</span>";
							}
							else
							{
								add_this_text = "<span style=\"color:lightgreen\">" + add_this_text + "</span>";
							}
						}

						document.getElementById("openings_text").innerHTML 
							= document.getElementById("openings_text").innerHTML + " " + add_this_text;

						piece_captured = null;
					}

					times_wrong = 0;

					if (!player_input && temp_arr[j+1] != "start")
						await new Promise(r => setTimeout(r, 1000));
					else if ((temp_arr[0] == "light" && j % 2 == 0) || (temp_arr[0] == "dark" && j % 2 == 1))
						await new Promise(r => setTimeout(r, 200));
				}

				document.getElementById("openings_text").innerHTML = document.getElementById("openings_text").innerHTML + "<br><u>" + temp_arr[temp_arr.length-1] + "</u>";

				document.getElementById("countdown_div").style.display = "block";
				document.getElementById("countdown_div_div").style.fontSize = 30;
				document.getElementById("countdown_text").innerHTML = "on to the next";

				await new Promise(r => setTimeout(r, 1000));

				document.getElementById("countdown_div").style.display = "none";
				document.getElementById("solution_btn").style.display = "none";

				openings_list.splice(index, 1);

				if (i<total_length-1)
				{
					document.getElementById("openings_text").innerHTML = document.getElementById("openings_text").innerHTML + "<br><br>";

					// reset
					flipped = false;
					cell_selected = null;
					waiting_for_user = -1;
					check_text = "";
					piece_captured = null;

					onLoad();
				}

				if (paused)
					document.getElementById("countdown_div").style.display = "block";
			}
			
			console.log("done");

			document.getElementById("countdown_div").style.display = "block";
			document.getElementById("countdown_div_div").style.fontSize = 30;
			document.getElementById("countdown_text").innerHTML = "done";
		}

		function pause(event)
		{
			if (event.key == " " || event.code == "Space" || event.keyCode == 32) 
			{
				paused = !paused;

				if (paused)
				{
					document.getElementById("countdown_div").style.display = "block";
					document.getElementById("countdown_div_div").style.fontSize = 30;
					document.getElementById("countdown_text").innerHTML = "paused";
				}
				else
					document.getElementById("countdown_div").style.display = "none";
			}
		}

		function solution(event)
		{
			//console.log(solution_text);
			//console.log(solution_text.substring(0, 2));
			//console.log(solution_text.substring(3, 5));

			times_wrong++;

			var add_this_text = "";
			if (solution_text == "O-O" || solution_text == "O-O-O")
				add_this_text = solution_text;
			else
			{
				var temp_cell_selected = board_arr[getRowIndex(solution_text.substring(0, 2))][getColIndex(solution_text.substring(0, 2))];

				add_this_text = solution_text.substring(3, 5);

				if (board_arr[getRowIndex(solution_text.substring(3, 5))][getColIndex(solution_text.substring(3, 5))].piece != null)
					add_this_text = "x"+add_this_text;

				if (board_arr[getRowIndex(solution_text.substring(3, 5))][getColIndex(solution_text.substring(3, 5))].piece != null && temp_cell_selected.piece.id.substring(2, 3) == "p")
				{
					add_this_text 
						= board_arr[getRowIndex(solution_text.substring(0, 2))][getColIndex(solution_text.substring(0, 2))].elem.id.substring(0, 1) 
							+ add_this_text;
				}

				switch (temp_cell_selected.piece.id.substring(2, 3))
				{
					case "r":
						add_this_text = "R"+add_this_text;
						break;
					case "n":
						add_this_text = "N"+add_this_text;
						break;
					case "b":
						add_this_text = "B"+add_this_text;
						break;
					case "q":
						add_this_text = "Q"+add_this_text;
						break;
					case "k":
						add_this_text = "K"+add_this_text;
						break;
				}
			}

			alert("Solution: "+add_this_text);
		}

		document.addEventListener('keyup', pause);

		window.onresize = onResizing;
		window.onload = onLoad;
	</script>
